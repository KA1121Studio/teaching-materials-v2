<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ANDROID URL Test</title>
</head>
<body style="background:#111;color:#fff">

<video id="video" controls playsinline style="width:100%"></video>

<script>
const videoId = "niKAylKNIEI";
const videoEl = document.getElementById("video");

// fetchで動画URLを取得
async function load() {
  const res = await fetch(`/video?id=${videoId}`);
  const data = await res.json();

  if (!data.video) {
    console.error("動画URLがありません", data);
    return;
  }

  videoEl.src = data.video;
}

load();
</script>

</body>
</html>
